spring:
  application:
    name: ResumeHelper

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/job_helper}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

openclaw:
  api:
    key: ${OPENCLAW_API_KEY:your-openclaw-key}

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL:}

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG